<!DOCTYPE html>
<html>
    <head>
        <title>formulario2</title>
    </head>
    <body>
        <h1>Formulario</h1>
        <form >
            <fieldset>
                <legend>Dados Pessoais</legend>
                <label id="nome">Nome:</label>
                <br>
                <input type="text">
                <br>
                <label id="data de nascimento">Data de Nascimento:</label>
                <br>
                <input type="date">
                <label id="cor favorita">Cor Favorita:</label>
                <input type="color">
                <br>
                <label id="">Endereço:</label>
                <br>
                <input type="text">
                <br>
                <label id="bairro">Bairro:</label>
                <br>
                <input type="text">
                <label id="cidade">Cidade:</label>
                <input type="text">
                <br>
                <Label id="cep">CEP:</Label>
                <br>
                <input type="number">
                <label id="estado">Estado:</label>
                <select>
                    <option>Ceará</option>
                    <option>Piaui</option>
                    <option>Bahia</option>
                    <option>Pernambuco</option>
                </select>
            </fieldset>
            <fieldset>
                <legend>Dados Profissionais</legend>
                <label>Natureza do Cargo:</label>
                <br>
                <input type="radio" name="cargo">Gerencia
                <input type="radio" name="cargo">Financeiro
                <input type="radio" name="cargo">Recepção
                <input type="radio" name="cargo">Administrativo
                <input type="radio" name="cargo">Juridico
                <br>
                <label id="area de interesse">Área de Interesse:</label>
                <br>
                <input type="checkbox" >Computação
                <input type="checkbox" >Quimica
                <input type="checkbox" >Meio Ambiente
                <input type="checkbox" >Engenharia
                <input type="checkbox" >Matematica
                <br>
                <label id="mini curriculo">Mini-curriculo:</label>
                <br>
                <textarea rows="10" cols="100"></textarea>
            </fieldset>
            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
        </form>
    </body>
</html>
