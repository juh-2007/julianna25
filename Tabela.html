<html>
    <head>
        <title>Tabela</title>
    </head>
    <body>
        <p><h1>Tabela</h1></p>

            <table border="1px">
                <tr>
                    <th>T1</th>
                    <th>T2</th>
                    <th>T3</th>
                </tr>
                <tr>
                    <td>A</td>
                    <td>B</td>
                    <td>C</td>
                </tr>
                <tr>
                    <td>D</td>
                    <td>E</td>
                    <td>F</td>
                </tr>
                <tr>
                    <td>G</td>
                    <td>H</td>
                    <td>I</td>
                </tr>
            </table>

            <p><h1>Tabela2</h1></p>

            <table border="1px">
                <tr>
                    <th>T1</th>
                    <th>T2</th>
                    <th>T3</th>
                </tr>
                <tr>
                    <td>A</td>
                    <td>B</td>
                    <td>C</td>
                </tr>
                <tr>
                    <td rowspan="2">D</td>
                    <td colspan="2">E</td>
                </tr>
                <tr>
                    <td>H</td>
                    <td>I</td>
                </tr>
            </table>

    </body>
</html>
